<!DOCTYPE html>
<html>
<head>
    <title>Student Information</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

    <div class="heading">
        Student Information
    </div>

    <table>
        <tr>
            <td>
                <label>Full Name (Text)</label>
                <input type="text" placeholder="Enter your full name">
            </td>

            <td>
                <label>Email Address</label>
                <input type="email" placeholder="your email@example.com">
            </td>
        </tr>

        
        
        <tr>
            <td>
                <label>Password</label>
                <input type="password" placeholder="Enter secure password">
            </td>

            <td>
                <label>Age (Number)</label>
                <input type="number" placeholder="Enter your age">
            </td>
        </tr>

       
       
        <tr>
            <td>
                <label>Experiment Date</label>
                <input type="date">
            </td>

            <td>
                <label>Phone Number (Tel)</label>
                <input type="tel" placeholder="+880 XXXXX XXXXXXX">
            </td>
     </tr>
        
    
    
    
    
     <tr>
            <td colspan="2" class="button-row">
                <input type="submit" class="button" value="Submit">
                <input type="reset" class="button" value="Clear">
            </td>
        </tr>
    
    </table>

</div>

</body>
</html>
